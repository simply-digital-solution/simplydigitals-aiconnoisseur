# ─────────────────────────────────────────────────────────────────────────────
# api-ci.yml  — Reusable workflow for simplydigitals-aiconnoisseur-api CI
#
# Called by orchestrator.yml only when API files change.
# Stages run in sequence with fail-fast so no resources are wasted.
#
# Metrics produced:
#   Speed       — Each job's duration shown in GitHub Actions UI
#   Stability   — Pass/fail history per job; flaky tests surfaced by re-run stats
#   Coverage    — Uploaded to Codecov; badge and PR comment auto-generated
#   Quality     — SonarCloud gate blocks merge if thresholds not met
# ─────────────────────────────────────────────────────────────────────────────

name: API CI

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: testing
      deploy:
        required: false
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:        { required: true }
      SONAR_TOKEN:          { required: false }
      SAFETY_API_KEY:       { required: false }
      AWS_ACCESS_KEY_ID:    { required: false }
      AWS_SECRET_ACCESS_KEY:{ required: false }
      AWS_ACCOUNT_ID:       { required: false }
      DATABASE_URL:         { required: false }

env:
  PYTHON_VERSION: "3.11"
  WORKING_DIR: simplydigitals-aiconnoisseur-api
  SECRET_KEY: ci-secret-key-at-least-32-chars-long!!
  ENVIRONMENT: testing
  DATABASE_URL: sqlite+aiosqlite:///:memory:

defaults:
  run:
    working-directory: simplydigitals-aiconnoisseur-api

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 1. LINT & TYPE CHECK
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Black
        run: black --check app tests

      - name: Mypy
        run: mypy app

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. SECURITY SCAN  (runs in parallel with lint)
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - name: Install security tools
        run: pip install bandit[toml] safety

      - name: Bandit SAST
        run: bandit -r app -c pyproject.toml --format json --output bandit-report.json

      - name: Safety dependency scan
        run: safety check --full-report
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        continue-on-error: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-api/bandit-report.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. UNIT TESTS + COVERAGE  (needs lint to pass first)
  # ═══════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - name: Install all dependencies
        run: pip install -e ".[dev,test]"

      - name: Run pytest
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=pytest-report.xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: simplydigitals-aiconnoisseur-api/coverage.xml
          flags: api-unit
          fail_ci_if_error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results-${{ github.run_id }}
          path: |
            simplydigitals-aiconnoisseur-api/pytest-report.xml
            simplydigitals-aiconnoisseur-api/htmlcov/
          retention-days: 7

      - name: Publish test summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: simplydigitals-aiconnoisseur-api/pytest-report.xml
          check_name: API Unit Tests

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. BDD TESTS  (needs lint to pass first)
  # ═══════════════════════════════════════════════════════════════════════════
  bdd-tests:
    name: BDD Tests (Behave)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - run: pip install -e ".[dev,test]"

      - name: Run Behave
        run: |
          behave tests/bdd/features/ \
            --no-capture \
            --format progress2 \
            --junit \
            --junit-directory bdd-results/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-results-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-api/bdd-results/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # 5. SONARCLOUD  (needs test results)
  # ═══════════════════════════════════════════════════════════════════════════
  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'push' && secrets.SONAR_TOKEN != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: api-test-results-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-api/

      - uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: simplydigitals-aiconnoisseur-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 6. BUILD & SCAN DOCKER IMAGE  (needs all tests to pass)
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, bdd-tests, security]
    timeout-minutes: 20
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: simplydigitals-aiconnoisseur-api
          push: false
          load: true
          tags: simplydigitals-aiconnoisseur-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: simplydigitals-aiconnoisseur-api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: simplydigitals-aiconnoisseur-api/trivy-results.sarif
          category: trivy-api

  # ═══════════════════════════════════════════════════════════════════════════
  # 7. DEPLOY — only on push to main, only if deploy input is true
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: inputs.deploy && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ steps.get-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/build-push-action@v5
        with:
          context: simplydigitals-aiconnoisseur-api
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/simplydigitals-aiconnoisseur-api:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/simplydigitals-aiconnoisseur-api:staging
          cache-from: type=gha,scope=api

      - name: Update Lambda (staging)
        run: |
          aws lambda update-function-code \
            --function-name simplydigitals-aiconnoisseur-api-staging \
            --image-uri ${{ steps.ecr.outputs.registry }}/simplydigitals-aiconnoisseur-api:${{ github.sha }}
          aws lambda wait function-updated \
            --function-name simplydigitals-aiconnoisseur-api-staging

      - id: get-url
        run: |
          URL=$(aws lambda get-function-url-config \
            --function-name simplydigitals-aiconnoisseur-api-staging \
            --query FunctionUrl --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test staging
        run: |
          for i in $(seq 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ steps.get-url.outputs.url }}health")
            [ "$STATUS" = "200" ] && echo "Staging healthy" && exit 0
            sleep 10
          done
          echo "Staging smoke test failed" && exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: inputs.deploy && github.ref == 'refs/heads/main'
    environment:
      name: production          # requires manual approval in GitHub Environments
      url: ${{ steps.get-url.outputs.url }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Promote staging image to production
        run: |
          aws ecr batch-get-image \
            --repository-name simplydigitals-aiconnoisseur-api \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text > manifest.json
          aws ecr put-image \
            --repository-name simplydigitals-aiconnoisseur-api \
            --image-tag production \
            --image-manifest file://manifest.json

      - name: Update Lambda (production)
        run: |
          aws lambda update-function-code \
            --function-name simplydigitals-aiconnoisseur-api-prod \
            --image-uri ${{ steps.ecr.outputs.registry }}/simplydigitals-aiconnoisseur-api:${{ github.sha }}
          aws lambda wait function-updated \
            --function-name simplydigitals-aiconnoisseur-api-prod

      - id: get-url
        run: |
          URL=$(aws lambda get-function-url-config \
            --function-name simplydigitals-aiconnoisseur-api-prod \
            --query FunctionUrl --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test production
        run: |
          for i in $(seq 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ steps.get-url.outputs.url }}health")
            [ "$STATUS" = "200" ] && echo "Production healthy" && exit 0
            sleep 10
          done
          echo "Production smoke test failed" && exit 1
