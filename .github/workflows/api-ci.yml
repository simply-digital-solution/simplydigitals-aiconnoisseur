name: API CI

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: testing
      deploy:
        required: false
        type: boolean
        default: false
      run_tests:
        required: false
        type: boolean
        default: true
    secrets:
      AWS_ACCESS_KEY_ID:     { required: false }
      AWS_SECRET_ACCESS_KEY: { required: false }
      AWS_ACCOUNT_ID:        { required: false }
      AWS_REGION:            { required: false }
      ECR_REPOSITORY:        { required: false }
      LAMBDA_FUNCTION_NAME:  { required: false }
      LAMBDA_ROLE_ARN:       { required: false }
      DATABASE_URL:          { required: false }
      SECRET_KEY:            { required: false }
      S3_ARTEFACT_BUCKET:    { required: false }
      ENVIRONMENT:           { required: false }

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  WORKING_DIR: simplydigitals-aiconnoisseur-api
  SECRET_KEY: "ci-secret-key-at-least-32-chars-long!!"
  ENVIRONMENT: testing
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"

defaults:
  run:
    working-directory: simplydigitals-aiconnoisseur-api

jobs:

  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check app tests --output-format=github
        continue-on-error: true

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    if: inputs.run_tests != false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev,test]"
      - name: Run pytest
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junitxml=pytest-report.xml \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-api/pytest-report.xml
          retention-days: 7

  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.resolve.outputs.version }}
      major:      ${{ steps.resolve.outputs.major }}
      minor:      ${{ steps.resolve.outputs.minor }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve version
        id: resolve
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          GIT_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -n "$GIT_TAG" ]; then
            VERSION="${GIT_TAG#v}"
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f1-2)
            IS_RELEASE="true"
          else
            LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -n "$LAST_TAG" ]; then
              DISTANCE=$(git rev-list ${LAST_TAG}..HEAD --count)
              BASE="${LAST_TAG#v}"
              VERSION="${BASE}-dev.${DISTANCE}+${SHORT_SHA}"
            else
              VERSION="0.0.0-dev+${SHORT_SHA}"
            fi
            MAJOR="0"
            MINOR="0"
            IS_RELEASE="false"
          fi
          echo "version=$VERSION"       >> $GITHUB_OUTPUT
          echo "major=$MAJOR"           >> $GITHUB_OUTPUT
          echo "minor=$MINOR"           >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (release=$IS_RELEASE)"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, version]
    if: always() && !failure() && !cancelled()
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: simplydigitals-aiconnoisseur-api
          push: false
          load: true
          tags: "simplydigitals-aiconnoisseur-api:${{ needs.version.outputs.version }}"
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "simplydigitals-aiconnoisseur-api:${{ needs.version.outputs.version }}"
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  deploy:
    name: Deploy API to Lambda
    runs-on: ubuntu-latest
    needs: [build, version]
    if: inputs.deploy && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: simplydigitals-aiconnoisseur-api
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.version.outputs.version }}
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
          cache-from: type=gha,scope=api

      - name: Create or update Lambda function
        run: |
          IMAGE_URI=${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          LAMBDA_NAME=${{ secrets.LAMBDA_FUNCTION_NAME }}
          REGION=ap-southeast-2
          EXISTS=$(aws lambda get-function \
            --function-name $LAMBDA_NAME \
            --region $REGION 2>&1 || echo "NOT_FOUND")
          if echo "$EXISTS" | grep -q "NOT_FOUND"; then
            echo "Creating Lambda function..."
            aws lambda create-function \
              --function-name $LAMBDA_NAME \
              --package-type Image \
              --code ImageUri=$IMAGE_URI \
              --role ${{ secrets.LAMBDA_ROLE_ARN }} \
              --timeout 300 \
              --memory-size 1024 \
              --region $REGION \
              --description "AI Connoisseur API v${{ needs.version.outputs.version }}" \
              --environment "Variables={ENVIRONMENT=production,SECRET_KEY=${{ secrets.SECRET_KEY }},DATABASE_URL=${{ secrets.DATABASE_URL }},MODEL_ARTEFACT_DIR=/tmp/artefacts,S3_BUCKET_NAME=${{ secrets.S3_ARTEFACT_BUCKET }},LOG_LEVEL=INFO}"
            aws lambda wait function-active \
              --function-name $LAMBDA_NAME --region $REGION
            echo "Lambda created"
          else
            echo "Updating Lambda function..."
            aws lambda update-function-code \
              --function-name $LAMBDA_NAME \
              --image-uri $IMAGE_URI \
              --region $REGION
            aws lambda wait function-updated \
              --function-name $LAMBDA_NAME --region $REGION
            echo "Lambda updated"
          fi

      - name: Create API Gateway
        run: |
          REGION=ap-southeast-2
          LAMBDA_NAME=${{ secrets.LAMBDA_FUNCTION_NAME }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          EXISTING=$(aws apigatewayv2 get-apis \
            --region $REGION \
            --query "Items[?Name=='simplydigitals-aiconnoisseur-api-gateway'].ApiId" \
            --output text)
          if [ -z "$EXISTING" ] || [ "$EXISTING" = "None" ]; then
            GW_ID=$(aws apigatewayv2 create-api \
              --name simplydigitals-aiconnoisseur-api-gateway \
              --protocol-type HTTP \
              --region $REGION \
              --query ApiId --output text)
            INT_ID=$(aws apigatewayv2 create-integration \
              --api-id $GW_ID \
              --integration-type AWS_PROXY \
              --integration-uri arn:aws:lambda:$REGION:$ACCOUNT:function:$LAMBDA_NAME \
              --payload-format-version 2.0 \
              --region $REGION \
              --query IntegrationId --output text)
            aws apigatewayv2 create-route \
              --api-id $GW_ID \
              --route-key "ANY /{proxy+}" \
              --target integrations/$INT_ID \
              --region $REGION
            aws apigatewayv2 create-stage \
              --api-id $GW_ID \
              --stage-name '$default' \
              --auto-deploy \
              --region $REGION
            aws lambda add-permission \
              --function-name $LAMBDA_NAME \
              --statement-id ApiGatewayInvoke \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:$REGION:$ACCOUNT:$GW_ID/*/*/{proxy+}" \
              --region $REGION 2>/dev/null || true
            echo "GATEWAY_ID=${GW_ID}" >> $GITHUB_ENV
          else
            echo "GATEWAY_ID=${EXISTING}" >> $GITHUB_ENV
          fi

      - name: Set API URL
        run: |
          URL="https://${GATEWAY_ID}.execute-api.ap-southeast-2.amazonaws.com"
          echo "API_URL=${URL}" >> $GITHUB_ENV
          echo "API URL: ${URL}"

      - name: Health check
        run: |
          echo "Target: ${API_URL}/health"
          sleep 20
          for i in $(seq 1 8); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              "${API_URL}/health" 2>/dev/null || echo "000")
            echo "Attempt $i - status $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API is live at ${API_URL}"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed - URL: ${API_URL}/health"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "=================================="
          echo " Version : ${{ needs.version.outputs.version }}"
          echo " Lambda  : ${{ secrets.LAMBDA_FUNCTION_NAME }}"
          echo " API URL : ${API_URL}"
          echo " Region  : ap-southeast-2"
          echo "=================================="
