name: API CI

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: testing
      deploy:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:     { required: false }
      AWS_SECRET_ACCESS_KEY: { required: false }
      AWS_ACCOUNT_ID:        { required: false }
      AWS_REGION:            { required: false }
      ECR_REPOSITORY:        { required: false }
      LAMBDA_FUNCTION_NAME:  { required: false }
      LAMBDA_ROLE_ARN:       { required: false }
      DATABASE_URL:          { required: false }
      SECRET_KEY:            { required: false }
      S3_ARTEFACT_BUCKET:    { required: false }
      ENVIRONMENT:           { required: false }

env:
  PYTHON_VERSION: "3.11"
  WORKING_DIR: simplydigitals-aiconnoisseur-api
  SECRET_KEY: ci-secret-key-at-least-32-chars-long!!
  ENVIRONMENT: testing
  DATABASE_URL: sqlite+aiosqlite:///:memory:

defaults:
  run:
    working-directory: simplydigitals-aiconnoisseur-api

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # 1. LINT & TYPE CHECK
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Black
        run: black --check app tests

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. UNIT TESTS
  # ═══════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev,test]"

      - name: Run pytest
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=pytest-report.xml \
            -v

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-api/pytest-report.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. BUILD DOCKER IMAGE
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: simplydigitals-aiconnoisseur-api
          push: false
          load: true
          tags: simplydigitals-aiconnoisseur-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: simplydigitals-aiconnoisseur-api:${{ github.sha }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. DEPLOY TO AWS LAMBDA
  # Runs only on push to main when deploy input is true
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy API to Lambda
    runs-on: ubuntu-latest
    needs: [build]
    if: inputs.deploy && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: simplydigitals-aiconnoisseur-api
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=api

      - name: Create Lambda function if it does not exist
        run: |
          EXISTS=$(aws lambda get-function \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --region ap-southeast-2 2>&1 || echo "NOT_FOUND")

          if echo "$EXISTS" | grep -q "NOT_FOUND"; then
            echo "Creating Lambda function..."
            aws lambda create-function \
              --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
              --package-type Image \
              --code ImageUri=${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} \
              --role ${{ secrets.LAMBDA_ROLE_ARN }} \
              --timeout 300 \
              --memory-size 1024 \
              --region ap-southeast-2 \
              --environment "Variables={
                ENVIRONMENT=production,
                SECRET_KEY=${{ secrets.SECRET_KEY }},
                DATABASE_URL=${{ secrets.DATABASE_URL }},
                MODEL_ARTEFACT_DIR=/tmp/artefacts,
                S3_BUCKET_NAME=${{ secrets.S3_ARTEFACT_BUCKET }},
                LOG_LEVEL=INFO
              }"
            aws lambda wait function-active \
              --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
              --region ap-southeast-2
            echo "Lambda created successfully"
          else
            echo "Updating existing Lambda function..."
            aws lambda update-function-code \
              --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
              --image-uri ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} \
              --region ap-southeast-2
            aws lambda wait function-updated \
              --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
              --region ap-southeast-2
            echo "Lambda updated successfully"
          fi

      - name: Create API Gateway if it does not exist
        run: |
          APIS=$(aws apigatewayv2 get-apis \
            --region ap-southeast-2 \
            --query "Items[?Name=='simplydigitals-aiconnoisseur-api-gateway'].ApiId" \
            --output text)

          if [ -z "$APIS" ]; then
            echo "Creating API Gateway..."
            API_ID=$(aws apigatewayv2 create-api \
              --name simplydigitals-aiconnoisseur-api-gateway \
              --protocol-type HTTP \
              --region ap-southeast-2 \
              --query ApiId --output text)

            INTEGRATION_ID=$(aws apigatewayv2 create-integration \
              --api-id $API_ID \
              --integration-type AWS_PROXY \
              --integration-uri arn:aws:lambda:ap-southeast-2:${{ secrets.AWS_ACCOUNT_ID }}:function:${{ secrets.LAMBDA_FUNCTION_NAME }} \
              --payload-format-version 2.0 \
              --region ap-southeast-2 \
              --query IntegrationId --output text)

            aws apigatewayv2 create-route \
              --api-id $API_ID \
              --route-key "ANY /{proxy+}" \
              --target integrations/$INTEGRATION_ID \
              --region ap-southeast-2

            aws apigatewayv2 create-stage \
              --api-id $API_ID \
              --stage-name production \
              --auto-deploy \
              --region ap-southeast-2

            aws lambda add-permission \
              --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
              --statement-id ApiGatewayInvoke \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:ap-southeast-2:${{ secrets.AWS_ACCOUNT_ID }}:$API_ID/*/*/{proxy+}" \
              --region ap-southeast-2

            API_URL="https://$API_ID.execute-api.ap-southeast-2.amazonaws.com/production"
            echo "API Gateway created: $API_URL"
          else
            API_ID=$APIS
            API_URL="https://$API_ID.execute-api.ap-southeast-2.amazonaws.com/production"
            echo "API Gateway already exists: $API_URL"
          fi

          echo "API_URL=$API_URL" >> $GITHUB_ENV

      - name: Health check
        run: |
          echo "Waiting for Lambda to warm up..."
          sleep 15
          for i in $(seq 1 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed (status $STATUS) — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
