name: API CI

on:
  workflow_call:
    inputs:
      run_lint:
        required: false
        type: boolean
        default: false
      run_tests:
        required: false
        type: boolean
        default: false
      run_deploy:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:     { required: false }
      AWS_SECRET_ACCESS_KEY: { required: false }
      AWS_ACCOUNT_ID:        { required: false }
      AWS_REGION:            { required: false }
      ECR_REPOSITORY:        { required: false }
      LAMBDA_FUNCTION_NAME:  { required: false }
      LAMBDA_ROLE_ARN:       { required: false }
      DATABASE_URL:          { required: false }
      SECRET_KEY:            { required: false }
      S3_ARTEFACT_BUCKET:    { required: false }
      ENVIRONMENT:           { required: false }

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  SECRET_KEY: "ci-secret-key-at-least-32-chars-long!!"
  ENVIRONMENT: testing
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"

defaults:
  run:
    working-directory: simplydigitals-aiconnoisseur-api

jobs:

  # ── 1. LINT — runs on feature branch push ──────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: inputs.run_lint
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

  # ── 2. UNIT TESTS + COVERAGE — runs on pull request ────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    if: inputs.run_tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev,test]"

      - name: Run pytest with coverage
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junitxml=pytest-report.xml \
            -v

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-api/pytest-report.xml
          retention-days: 7

  # ── 3. SECURITY — runs on pull request ────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: inputs.run_tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Bandit SAST
        run: |
          bandit -r app -ll -f json -o bandit-report.json || true
          bandit -r app -ll

      - name: pip-audit CVE scan
        run: |
          pip-audit --desc --skip-editable \
            --ignore-vuln CVE-2024-23342 \
            --ignore-vuln GHSA-rf74-v2fm-23pw \
            --ignore-vuln CVE-2026-33230 \
            --ignore-vuln CVE-2026-33231 \
            --ignore-vuln CVE-2026-4539

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: simplydigitals-aiconnoisseur-api
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-bandit-report-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-api/bandit-report.json
          retention-days: 7

  # ── 4. VERSION — runs on merge to main ─────────────────────────────────────
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: inputs.run_deploy
    outputs:
      version:    ${{ steps.resolve.outputs.version }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: resolve
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          GIT_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -n "$GIT_TAG" ]; then
            VERSION="${GIT_TAG#v}"
            IS_RELEASE="true"
          else
            LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -n "$LAST_TAG" ]; then
              DISTANCE=$(git rev-list ${LAST_TAG}..HEAD --count)
              BASE="${LAST_TAG#v}"
              VERSION="${BASE}-dev.${DISTANCE}-${SHORT_SHA}"
            else
              VERSION="0.0.0-dev-${SHORT_SHA}"
            fi
            IS_RELEASE="false"
          fi
          echo "version=$VERSION"       >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (release=$IS_RELEASE)"

  # ── 4. BUILD + DEPLOY — runs on merge to main ──────────────────────────────
  deploy:
    name: Build & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: [version]
    if: inputs.run_deploy
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: simplydigitals-aiconnoisseur-api
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.version.outputs.version }}
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}

      - name: Create or update Lambda function
        run: |
          IMAGE_URI=${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          LAMBDA_NAME=${{ secrets.LAMBDA_FUNCTION_NAME }}
          REGION=ap-southeast-2

          EXISTS=$(aws lambda get-function \
            --function-name $LAMBDA_NAME \
            --region $REGION 2>&1 || echo "NOT_FOUND")

          if echo "$EXISTS" | grep -q "NOT_FOUND"; then
            echo "Creating Lambda function..."
            aws lambda create-function \
              --function-name $LAMBDA_NAME \
              --package-type Image \
              --code ImageUri=$IMAGE_URI \
              --role ${{ secrets.LAMBDA_ROLE_ARN }} \
              --timeout 300 \
              --memory-size 1024 \
              --region $REGION \
              --description "AI Connoisseur API v${{ needs.version.outputs.version }}" \
              --environment "Variables={ENVIRONMENT=production,SECRET_KEY=${{ secrets.SECRET_KEY }},DATABASE_URL=${{ secrets.DATABASE_URL }},MODEL_ARTEFACT_DIR=/tmp/artefacts,S3_BUCKET_NAME=${{ secrets.S3_ARTEFACT_BUCKET }},LOG_LEVEL=INFO}" \
              --vpc-config "SubnetIds=subnet-0f5698acf70fb4e7a,subnet-075b43bf46ddc0259,subnet-01c1232a8ba43ba28,SecurityGroupIds=sg-0154c0e296fe97958"
            aws lambda wait function-active \
              --function-name $LAMBDA_NAME --region $REGION
          else
            echo "Updating Lambda function..."
            aws lambda update-function-code \
              --function-name $LAMBDA_NAME \
              --image-uri $IMAGE_URI \
              --region $REGION
            aws lambda wait function-updated \
              --function-name $LAMBDA_NAME --region $REGION
            aws lambda update-function-configuration \
              --function-name $LAMBDA_NAME \
              --region $REGION \
              --environment "Variables={ENVIRONMENT=production,SECRET_KEY=${{ secrets.SECRET_KEY }},DATABASE_URL=${{ secrets.DATABASE_URL }},MODEL_ARTEFACT_DIR=/tmp/artefacts,S3_BUCKET_NAME=${{ secrets.S3_ARTEFACT_BUCKET }},LOG_LEVEL=INFO}" \
              --vpc-config "SubnetIds=subnet-0f5698acf70fb4e7a,subnet-075b43bf46ddc0259,subnet-01c1232a8ba43ba28,SecurityGroupIds=sg-0154c0e296fe97958"
            aws lambda wait function-updated \
              --function-name $LAMBDA_NAME --region $REGION
          fi
          echo "Lambda deployed: v${{ needs.version.outputs.version }}"

      - name: Run database migrations
        run: |
          LAMBDA_NAME=${{ secrets.LAMBDA_FUNCTION_NAME }}
          REGION=ap-southeast-2
          echo "Running alembic upgrade head via Lambda..."
          aws lambda invoke \
            --function-name $LAMBDA_NAME \
            --region $REGION \
            --payload '{"action": "migrate"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/migration_response.json
          cat /tmp/migration_response.json
          STATUS=$(jq -r '.statusCode' /tmp/migration_response.json)
          if [ "$STATUS" != "200" ]; then
            echo "Migration failed with status $STATUS"
            exit 1
          fi
          echo "Migrations applied successfully"

      - name: Create API Gateway if not exists
        run: |
          REGION=ap-southeast-2
          LAMBDA_NAME=${{ secrets.LAMBDA_FUNCTION_NAME }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}

          EXISTING=$(aws apigatewayv2 get-apis \
            --region $REGION \
            --query "Items[?Name=='simplydigitals-aiconnoisseur-api-gateway'].ApiId" \
            --output text)

          if [ -z "$EXISTING" ] || [ "$EXISTING" = "None" ]; then
            GW_ID=$(aws apigatewayv2 create-api \
              --name simplydigitals-aiconnoisseur-api-gateway \
              --protocol-type HTTP \
              --region $REGION \
              --query ApiId --output text)
            INT_ID=$(aws apigatewayv2 create-integration \
              --api-id $GW_ID \
              --integration-type AWS_PROXY \
              --integration-uri arn:aws:lambda:$REGION:$ACCOUNT:function:$LAMBDA_NAME \
              --payload-format-version 2.0 \
              --region $REGION \
              --query IntegrationId --output text)
            aws apigatewayv2 create-route \
              --api-id $GW_ID \
              --route-key "ANY /{proxy+}" \
              --target integrations/$INT_ID \
              --region $REGION
            aws apigatewayv2 create-stage \
              --api-id $GW_ID \
              --stage-name '$default' \
              --auto-deploy \
              --region $REGION
            aws lambda add-permission \
              --function-name $LAMBDA_NAME \
              --statement-id ApiGatewayInvoke \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:$REGION:$ACCOUNT:$GW_ID/*/*/{proxy+}" \
              --region $REGION 2>/dev/null || true
            echo "GATEWAY_ID=${GW_ID}" >> $GITHUB_ENV
          else
            echo "GATEWAY_ID=${EXISTING}" >> $GITHUB_ENV
          fi

      - name: Set API URL
        run: |
          URL="https://${GATEWAY_ID}.execute-api.ap-southeast-2.amazonaws.com"
          echo "API_URL=${URL}" >> $GITHUB_ENV
          echo "API URL: ${URL}"

      - name: Health check
        run: |
          echo "Health check target: ${API_URL}/health"
          echo "Waiting for Lambda to warm up..."
          sleep 30
          for i in $(seq 1 4); do
            RESPONSE=$(curl -s -o /tmp/health_response.txt -w "%{http_code}" \
              "${API_URL}/health" 2>/dev/null || echo "000")
            BODY=$(cat /tmp/health_response.txt 2>/dev/null || echo "")
            echo "Attempt $i — status: $RESPONSE — body: $BODY"
            if [ "$RESPONSE" = "200" ]; then
              echo "API is live at ${API_URL}"
              exit 0
            fi
            sleep 20
          done
          echo "Health check failed after 4 attempts"
          echo "Last response body: $BODY"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "=================================="
          echo " Version : ${{ needs.version.outputs.version }}"
          echo " Lambda  : ${{ secrets.LAMBDA_FUNCTION_NAME }}"
          echo " API URL : ${API_URL}"
          echo " Region  : ap-southeast-2"
          echo "=================================="
