name: UI CI

permissions:
  contents: read
  id-token: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      deploy:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:          { required: false }
      AWS_SECRET_ACCESS_KEY:      { required: false }
      AWS_ACCOUNT_ID:             { required: false }
      AWS_REGION:                 { required: false }
      S3_UI_BUCKET:               { required: false }
      CLOUDFRONT_DISTRIBUTION_ID: { required: false }

defaults:
  run:
    working-directory: simplydigitals-aiconnoisseur-ui

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # 1. LINT
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simplydigitals-aiconnoisseur-ui/package.json

      - run: npm install

      - name: ESLint
        run: npx eslint src --ext .js,.jsx --max-warnings 0
        continue-on-error: true

      - name: Prettier check
        run: npx prettier --check "src/**/*.{js,jsx,css}"
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. RESOLVE VERSION (mirrors the API version from git tags)
  # ═══════════════════════════════════════════════════════════════════════════
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.resolve.outputs.version }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: resolve
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          GIT_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -n "$GIT_TAG" ]; then
            VERSION="${GIT_TAG#v}"
            IS_RELEASE="true"
          else
            LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -n "$LAST_TAG" ]; then
              DISTANCE=$(git rev-list ${LAST_TAG}..HEAD --count)
              BASE="${LAST_TAG#v}"
              VERSION="${BASE}-dev.${DISTANCE}+${SHORT_SHA}"
            else
              VERSION="0.0.0-dev+${SHORT_SHA}"
            fi
            IS_RELEASE="false"
          fi

          echo "version=$VERSION"       >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "UI version: $VERSION (release=$IS_RELEASE)"

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. BUILD
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, version]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simplydigitals-aiconnoisseur-ui/package.json

      - run: npm install

      - name: Vite build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_URL }}
          VITE_APP_VERSION: ${{ needs.version.outputs.version }}

      - name: Inject version into build
        run: |
          echo "{ \"version\": \"${{ needs.version.outputs.version }}\", \"build\": \"${{ github.sha }}\" }" \
            > dist/version.json
          echo "Version file created: dist/version.json"

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-ui/dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. DEPLOY TO S3
  # Runs only on push to main when deploy input is true
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy UI to S3
    runs-on: ubuntu-latest
    needs: [build, version]
    if: inputs.deploy && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: "https://${{ vars.S3_UI_BUCKET }}.s3-website-ap-southeast-2.amazonaws.com"
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ui-dist-${{ github.run_id }}
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_UI_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "version.json"

      - name: Upload index.html (no cache)
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_UI_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Upload version.json (no cache)
        run: |
          aws s3 cp dist/version.json s3://${{ secrets.S3_UI_BUCKET }}/version.json \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "application/json"

      - name: Invalidate CloudFront cache
        if: secrets.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query Invalidation.Id \
            --output text)
          echo "CloudFront invalidation started: $INVALIDATION_ID"

      - name: Print deployment summary
        run: |
          echo "=================================="
          echo " UI Deployment Summary"
          echo "=================================="
          echo " Version : ${{ needs.version.outputs.version }}"
          echo " Release : ${{ needs.version.outputs.is_release }}"
          echo " Bucket  : ${{ secrets.S3_UI_BUCKET }}"
          echo " URL     : https://${{ secrets.S3_UI_BUCKET }}.s3-website-ap-southeast-2.amazonaws.com"
          echo "=================================="
