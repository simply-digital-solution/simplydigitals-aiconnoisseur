# ─────────────────────────────────────────────────────────────────────────────
# ui-ci.yml  — Reusable workflow for simplydigitals-aiconnoisseur-ui CI
#
# Called by orchestrator.yml only when UI files change.
# ─────────────────────────────────────────────────────────────────────────────

name: UI CI

on:
  workflow_call:
    inputs:
      deploy:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:    { required: false }
      AWS_SECRET_ACCESS_KEY:{ required: false }
      AWS_ACCOUNT_ID:       { required: false }

defaults:
  run:
    working-directory: simplydigitals-aiconnoisseur-ui

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 1. LINT
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simplydigitals-aiconnoisseur-ui/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npx eslint src --ext .js,.jsx --max-warnings 0

      - name: Prettier check
        run: npx prettier --check "src/**/*.{js,jsx,css}"

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. BUILD  (catches import errors, missing deps, Tailwind issues)
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simplydigitals-aiconnoisseur-ui/package-lock.json

      - run: npm ci

      - name: Vite build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-ui/dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. DEPLOY TO S3 + CLOUDFRONT  (main branch only)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy UI to Staging (S3)
    runs-on: ubuntu-latest
    needs: [build]
    if: inputs.deploy && github.ref == 'refs/heads/main'
    environment:
      name: ui-staging
      url: https://staging.aiconnoisseur.simplydigitalsolutions.com
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ui-dist-${{ github.run_id }}
          path: dist/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Sync to S3 staging bucket
        run: |
          aws s3 sync dist/ s3://simplydigitals-aiconnoisseur-ui-staging/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://simplydigitals-aiconnoisseur-ui-staging/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront staging cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_STAGING_DIST_ID }} \
            --paths "/*"

  deploy-production:
    name: Deploy UI to Production (S3)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: inputs.deploy && github.ref == 'refs/heads/main'
    environment:
      name: ui-production      # requires manual approval
      url: https://aiconnoisseur.simplydigitalsolutions.com
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ui-dist-${{ github.run_id }}
          path: dist/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Sync to S3 production bucket
        run: |
          aws s3 sync dist/ s3://simplydigitals-aiconnoisseur-ui-prod/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://simplydigitals-aiconnoisseur-ui-prod/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront production cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_PROD_DIST_ID }} \
            --paths "/*"
