name: UI CI

on:
  workflow_call:
    inputs:
      deploy:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:          { required: false }
      AWS_SECRET_ACCESS_KEY:      { required: false }
      AWS_ACCOUNT_ID:             { required: false }
      AWS_REGION:                 { required: false }
      S3_UI_BUCKET:               { required: false }
      CLOUDFRONT_DISTRIBUTION_ID: { required: false }

permissions:
  contents: read
  id-token: write
  pull-requests: write

defaults:
  run:
    working-directory: simplydigitals-aiconnoisseur-ui

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simplydigitals-aiconnoisseur-ui/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npx eslint src --ext .js,.jsx --max-warnings 0
        continue-on-error: true
      - name: Prettier check
        run: npx prettier --check "src/**/*.{js,jsx,css}"
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simplydigitals-aiconnoisseur-ui/package-lock.json
      - run: npm ci
      - name: Vite build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist-${{ github.run_id }}
          path: simplydigitals-aiconnoisseur-ui/dist/
          retention-days: 7

  deploy:
    name: Deploy UI to S3
    runs-on: ubuntu-latest
    needs: [build]
    if: inputs.deploy && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ui-dist-${{ github.run_id }}
          path: dist/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      - name: Sync assets to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_UI_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
      - name: Upload index.html
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_UI_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"
      - name: Invalidate CloudFront
        run: |
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
          else
            echo "No CloudFront distribution ID set — skipping invalidation"
          fi
