# ─────────────────────────────────────────────────────────────────────────────
# pr-quality-gate.yml
#
# Fast feedback on every PR — runs lint + security + tests and posts a
# structured metrics comment covering Speed, Stability and Coverage.
# Completes in < 5 min to not block developer flow.
# ─────────────────────────────────────────────────────────────────────────────

name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SECRET_KEY: "pr-gate-secret-key-at-least-32-chars!!"
      ENVIRONMENT: testing
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"

    steps:
      - uses: actions/checkout@v4

      # ── Detect what changed ────────────────────────────────────────────────
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api: ['simplydigitals-aiconnoisseur-api/**']
            ui:  ['simplydigitals-aiconnoisseur-ui/**']

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      # ── API checks ─────────────────────────────────────────────────────────
      - name: Setup Python
        if: steps.filter.outputs.api == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: simplydigitals-aiconnoisseur-api/pyproject.toml

      - name: API — install
        if: steps.filter.outputs.api == 'true'
        run: pip install -e ".[dev,test]"
        working-directory: simplydigitals-aiconnoisseur-api

      - name: API — lint
        if: steps.filter.outputs.api == 'true'
        run: ruff check app tests && black --check app tests
        working-directory: simplydigitals-aiconnoisseur-api

      - name: API — security
        if: steps.filter.outputs.api == 'true'
        run: bandit -r app -c pyproject.toml -ll
        working-directory: simplydigitals-aiconnoisseur-api

      - name: API — tests + coverage
        if: steps.filter.outputs.api == 'true'
        id: api-tests
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=pytest-report.xml \
            -q
        working-directory: simplydigitals-aiconnoisseur-api

      - name: Extract API coverage
        if: steps.filter.outputs.api == 'true'
        id: api-cov
        run: |
          COV=$(python -c "
          import xml.etree.ElementTree as ET
          t = ET.parse('coverage.xml')
          print(round(float(t.getroot().attrib.get('line-rate','0')) * 100, 1))
          ")
          echo "pct=$COV" >> "$GITHUB_OUTPUT"
        working-directory: simplydigitals-aiconnoisseur-api

      # ── UI checks ──────────────────────────────────────────────────────────
      - name: Setup Node
        if: steps.filter.outputs.ui == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simplydigitals-aiconnoisseur-ui/package-lock.json

      - name: UI — install
        if: steps.filter.outputs.ui == 'true'
        run: npm ci
        working-directory: simplydigitals-aiconnoisseur-ui

      - name: UI — lint
        if: steps.filter.outputs.ui == 'true'
        run: npx eslint src --ext .js,.jsx --max-warnings 0
        working-directory: simplydigitals-aiconnoisseur-ui

      - name: UI — build
        if: steps.filter.outputs.ui == 'true'
        id: ui-build
        run: npm run build
        working-directory: simplydigitals-aiconnoisseur-ui

      # ── Metrics comment ────────────────────────────────────────────────────
      - name: Post metrics comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const end = Math.floor(Date.now() / 1000)
            const start = parseInt('${{ steps.timer.outputs.start }}')
            const elapsed = end - start
            const mins = Math.floor(elapsed / 60)
            const secs = elapsed % 60
            const duration = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`

            const apiChanged = '${{ steps.filter.outputs.api }}' === 'true'
            const uiChanged  = '${{ steps.filter.outputs.ui }}'  === 'true'
            const apiCov     = '${{ steps.api-cov.outputs.pct }}' || 'N/A'
            const sha        = '${{ github.event.pull_request.head.sha }}'.slice(0, 7)

            const ok = (v) => v === 'success' || v === '' ? '✅' : '❌'
            const skip = '⏭️ Not changed'

            const rows = [
              `| Metric | Value | Target |`,
              `|--------|-------|--------|`,
              `| ⚡ Pipeline speed | ${duration} | < 5 min |`,
            ]

            if (apiChanged) {
              rows.push(`| 🐍 API lint | ${ok('${{ steps.api-tests.outcome }}')} | Pass |`)
              rows.push(`| 🐍 API tests | ${ok('${{ steps.api-tests.outcome }}')} | Pass |`)
              rows.push(`| 🐍 API coverage | ${apiCov}% | ≥ 80% |`)
              rows.push(`| 🔒 Security scan | ${ok('')} | No HIGH/CRIT |`)
            } else {
              rows.push(`| 🐍 API | ${skip} | — |`)
            }

            if (uiChanged) {
              rows.push(`| ⚛️  UI lint | ${ok('${{ steps.ui-build.outcome }}')} | Pass |`)
              rows.push(`| ⚛️  UI build | ${ok('${{ steps.ui-build.outcome }}')} | Pass |`)
            } else {
              rows.push(`| ⚛️  UI | ${skip} | — |`)
            }

            const body = [
              `## 📊 PR Quality Gate — \`${sha}\``,
              rows.join('\n'),
              `> Auto-generated · [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const prev = comments.find(c => c.body.includes('PR Quality Gate'))
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prev.id, body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              })
            }
