# ─────────────────────────────────────────────────────────────────────────────
# detect-changes.yml
#
# PURPOSE: Determine which sub-projects changed in a push or PR.
# OUTPUT:  Boolean flags consumed by all downstream workflows via job outputs.
#
# This is the foundation of monorepo CI — nothing else runs unless this says
# something changed. Prevents unnecessary builds, test runs and deployments.
# ─────────────────────────────────────────────────────────────────────────────

name: Detect Changes

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api:      ${{ steps.filter.outputs.api }}
      ui:       ${{ steps.filter.outputs.ui }}
      infra:    ${{ steps.filter.outputs.infra }}
      ci:       ${{ steps.filter.outputs.ci }}
      any:      ${{ steps.any.outputs.any }}

    steps:
      - uses: actions/checkout@v4

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'simplydigitals-aiconnoisseur-api/**'
              - '!simplydigitals-aiconnoisseur-api/**.md'
              - '!simplydigitals-aiconnoisseur-api/docs/**'
            ui:
              - 'simplydigitals-aiconnoisseur-ui/**'
              - '!simplydigitals-aiconnoisseur-ui/**.md'
            infra:
              - 'simplydigitals-aiconnoisseur-api/Dockerfile'
              - 'simplydigitals-aiconnoisseur-api/docker-compose.yml'
              - 'simplydigitals-aiconnoisseur-api/scripts/**'
            ci:
              - '.github/workflows/**'

      - name: Compute any-changed flag
        id: any
        run: |
          if [ "${{ steps.filter.outputs.api }}" = "true" ] || [ "${{ steps.filter.outputs.ui }}" = "true" ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi
