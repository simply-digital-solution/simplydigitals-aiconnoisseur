name: Orchestrator

on:
  push:
    branches: [main, develop, "feature/**", "feat/**", "fix/**", "refactor/**", "hotfix/**"]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"    # trigger full deploy on semver tags e.g. v1.2.3
  pull_request:
    branches: [main, develop]

permissions:
  pull-requests: write
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:

  # ── Step 1: Detect changes ─────────────────────────────────────────────────
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui:  ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'simplydigitals-aiconnoisseur-api/**'
              - '!simplydigitals-aiconnoisseur-api/**.md'
              - '!simplydigitals-aiconnoisseur-api/docs/**'
            ui:
              - 'simplydigitals-aiconnoisseur-ui/**'
              - '!simplydigitals-aiconnoisseur-ui/**.md'

      # On a version tag — force both pipelines to run
      - name: Force both pipelines on version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Version tag detected — both API and UI pipelines will deploy"

  # ── Step 2a: Run API pipeline ──────────────────────────────────────────────
  api:
    name: API Pipeline
    needs: detect
    if: |
      needs.detect.outputs.api == 'true' ||
      startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/api-ci.yml
    with:
      deploy: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID:        ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY:        ${{ secrets.ECR_REPOSITORY }}
      LAMBDA_FUNCTION_NAME:  ${{ secrets.LAMBDA_FUNCTION_NAME }}
      LAMBDA_ROLE_ARN:       ${{ secrets.LAMBDA_ROLE_ARN }}
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      SECRET_KEY:            ${{ secrets.SECRET_KEY }}
      S3_ARTEFACT_BUCKET:    ${{ secrets.S3_ARTEFACT_BUCKET }}
      ENVIRONMENT:           ${{ secrets.ENVIRONMENT }}

  # ── Step 2b: Run UI pipeline ───────────────────────────────────────────────
  ui:
    name: UI Pipeline
    needs: detect
    if: |
      needs.detect.outputs.ui == 'true' ||
      startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/ui-ci.yml
    with:
      deploy: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    secrets:
      AWS_ACCESS_KEY_ID:          ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:      ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID:             ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_REGION:                 ${{ secrets.AWS_REGION }}
      S3_UI_BUCKET:               ${{ secrets.S3_UI_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

  # ── Step 3: Post unified PR summary ───────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [detect, api, ui]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const apiChanged = '${{ needs.detect.outputs.api }}' === 'true'
            const uiChanged  = '${{ needs.detect.outputs.ui }}'  === 'true'
            const apiResult  = '${{ needs.api.result }}'
            const uiResult   = '${{ needs.ui.result }}'
            const sha        = '${{ github.event.pull_request.head.sha }}'.slice(0, 7)
            const runUrl     = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : r === 'skipped' ? '⏭️' : '⏳'
            const rows = []
            if (apiChanged) rows.push(`| API Pipeline | ${icon(apiResult)} ${apiResult} |`)
            if (uiChanged)  rows.push(`| UI Pipeline  | ${icon(uiResult)}  ${uiResult}  |`)
            if (!apiChanged && !uiChanged) rows.push(`| No source changes detected | ⏭️ skipped |`)
            const body = [
              `## CI/CD Summary — \`${sha}\``,
              `| Pipeline | Result |`,
              `|----------|--------|`,
              ...rows,
              ``,
              `[View full run](${runUrl})`,
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c => c.body.includes('CI/CD Summary'))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              })
            }
