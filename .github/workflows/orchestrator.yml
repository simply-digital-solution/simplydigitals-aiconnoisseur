name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "refactor/**"
      - "hotfix/**"
      - "deploy/**"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:

  # ── Detect which components changed ────────────────────────────────────────
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui:  ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'simplydigitals-aiconnoisseur-api/**'
              - '!simplydigitals-aiconnoisseur-api/**.md'
              - '!simplydigitals-aiconnoisseur-api/docs/**'
            ui:
              - 'simplydigitals-aiconnoisseur-ui/**'
              - '!simplydigitals-aiconnoisseur-ui/**.md'

  # ── API Pipeline ────────────────────────────────────────────────────────────
  api:
    name: API Pipeline
    needs: detect
    if: needs.detect.outputs.api == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/api-ci.yml
    with:
      # Push to feature branch → lint only
      # Pull request → tests only
      # Merge to main or tag → deploy only
      run_lint:   ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}
      run_tests:  ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v') }}
      run_deploy: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v') }}
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID:        ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY:        ${{ secrets.ECR_REPOSITORY }}
      LAMBDA_FUNCTION_NAME:  ${{ secrets.LAMBDA_FUNCTION_NAME }}
      LAMBDA_ROLE_ARN:       ${{ secrets.LAMBDA_ROLE_ARN }}
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      SECRET_KEY:            ${{ secrets.SECRET_KEY }}
      S3_ARTEFACT_BUCKET:    ${{ secrets.S3_ARTEFACT_BUCKET }}
      ENVIRONMENT:           ${{ secrets.ENVIRONMENT }}

  # ── UI Pipeline ─────────────────────────────────────────────────────────────
  ui:
    name: UI Pipeline
    needs: detect
    if: needs.detect.outputs.ui == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/ui-ci.yml
    with:
      run_lint:   ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}
      run_tests:  ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v') }}
      run_deploy: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v') }}
    secrets:
      AWS_ACCESS_KEY_ID:          ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:      ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID:             ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_REGION:                 ${{ secrets.AWS_REGION }}
      S3_UI_BUCKET:               ${{ secrets.S3_UI_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
      PROD_API_URL:               ${{ secrets.PROD_API_URL }}

  # ── Post-Deploy Integration Tests ───────────────────────────────────────────
  # Runs only after a successful merge-to-main deploy.
  # At least one of api/ui must have deployed (not just skipped).
  post-deploy-tests:
    name: Post-Deploy Integration Tests
    needs: [api, ui]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.api.result != 'failure' &&
      needs.ui.result != 'failure' &&
      (needs.api.result == 'success' || needs.ui.result == 'success')
    uses: ./.github/workflows/post-deploy-tests.yml
    secrets:
      PROD_API_URL: ${{ secrets.PROD_API_URL }}
      PROD_UI_URL:  ${{ secrets.PROD_UI_URL }}

  # ── PR Summary comment ──────────────────────────────────────────────────────
  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [detect, api, ui]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const apiChanged = '${{ needs.detect.outputs.api }}' === 'true'
            const uiChanged  = '${{ needs.detect.outputs.ui }}'  === 'true'
            const apiResult  = '${{ needs.api.result }}'
            const uiResult   = '${{ needs.ui.result }}'
            const sha        = '${{ github.event.pull_request.head.sha }}'.slice(0, 7)
            const runUrl     = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : r === 'skipped' ? '⏭️' : '⏳'
            const rows = []
            if (apiChanged) rows.push(`| API — Tests + Coverage | ${icon(apiResult)} ${apiResult} |`)
            if (uiChanged)  rows.push(`| UI  — Tests + Coverage | ${icon(uiResult)}  ${uiResult}  |`)
            if (!apiChanged && !uiChanged) rows.push(`| No source changes | ⏭️ skipped |`)
            const body = [
              `## PR Quality Gate — \`${sha}\``,
              `| Pipeline | Result |`,
              `|----------|--------|`,
              ...rows,
              ``,
              `[View full run](${runUrl})`,
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c => c.body.includes('PR Quality Gate'))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              })
            }
