# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — ML Analytics API
#
# Stages:
#   1. lint          — code style, type-checking
#   2. security      — SAST (Bandit) + dependency vulnerabilities (Safety)
#   3. unit-tests    — pytest with coverage report (→ Codecov)
#   4. bdd-tests     — Behave BDD scenarios
#   5. build         — Docker image build
#   6. deploy        — AWS Lambda deployment (main branch only)
#   7. smoke-test    — post-deployment health check
#
# Metrics tracked:
#   Speed     — job durations via built-in timing + dashboard badge
#   Stability — pass/fail history visible in GitHub Actions UI
#   Maintainability — SonarCloud code quality gate
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: mlapi
  LAMBDA_FUNCTION: mlapi-prod

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 1. LINT & FORMAT
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app tests

      - name: Mypy type-check
        run: mypy app

  # ═══════════════════════════════════════════════════════════════
  # 2. SECURITY SCANNING
  # ═══════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit[toml] safety

      - name: Bandit SAST (app code)
        run: bandit -r app -c pyproject.toml --format json --output bandit-report.json
        continue-on-error: false

      - name: Safety dependency check
        run: safety check --full-report
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ═══════════════════════════════════════════════════════════════
  # 3. UNIT TESTS + COVERAGE
  # ═══════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    env:
      SECRET_KEY: ci-test-secret-key-at-least-32-chars!!
      ENVIRONMENT: testing
      DATABASE_URL: sqlite+aiosqlite:///:memory:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install all dependencies
        run: pip install -e ".[dev,test]"

      - name: Run pytest with coverage
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=pytest-report.xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            pytest-report.xml
            htmlcov/

      - name: Publish test summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: pytest-report.xml

  # ═══════════════════════════════════════════════════════════════
  # 4. BDD TESTS
  # ═══════════════════════════════════════════════════════════════
  bdd-tests:
    name: BDD Tests (Behave)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    env:
      SECRET_KEY: ci-bdd-secret-key-at-least-32-chars!!!
      ENVIRONMENT: testing
      DATABASE_URL: sqlite+aiosqlite:///:memory:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,test]"

      - name: Run Behave BDD tests
        run: |
          behave tests/bdd/features/ \
            --no-capture \
            --format progress2 \
            --junit \
            --junit-directory bdd-results/

      - name: Upload BDD results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-results
          path: bdd-results/

  # ═══════════════════════════════════════════════════════════════
  # 5. SONARCLOUD — MAINTAINABILITY METRICS
  # ═══════════════════════════════════════════════════════════════
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for better analysis

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # 6. BUILD DOCKER IMAGE
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, bdd-tests, security]
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on PRs)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Trivy container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mlapi:latest
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  # ═══════════════════════════════════════════════════════════════
  # 7. DEPLOY TO AWS LAMBDA (main branch only)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.get-url.outputs.api-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }},${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION }}

      - name: Get API Gateway URL
        id: get-url
        run: |
          URL=$(aws lambda get-function-url-config \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --query 'FunctionUrl' --output text)
          echo "api-url=$URL" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════
  # 8. SMOKE TEST
  # ═══════════════════════════════════════════════════════════════
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Health check
        run: |
          URL="${{ needs.deploy.outputs.api-url || secrets.API_BASE_URL }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i failed with $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

  # ═══════════════════════════════════════════════════════════════
  # Pipeline status badge summary
  # ═══════════════════════════════════════════════════════════════
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests, bdd-tests, build]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Pipeline Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| BDD Tests | ${{ needs.bdd-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
