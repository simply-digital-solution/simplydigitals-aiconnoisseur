# Pull Request quality gate — fast feedback, runs on every PR
# Measures and posts Speed & Stability metrics as a PR comment.

name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SECRET_KEY: pr-gate-secret-key-at-least-32-chars!!
      ENVIRONMENT: testing
      DATABASE_URL: sqlite+aiosqlite:///:memory:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Record start time
        id: start
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pip install -e ".[dev,test]"

      - name: Lint (Ruff)
        run: ruff check app tests

      - name: Security scan
        run: bandit -r app -c pyproject.toml -ll

      - name: Unit tests
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junitxml=pr-test-results.xml \
            -q

      - name: Calculate pipeline duration
        id: duration
        run: |
          END=$(date +%s)
          ELAPSED=$(( END - ${{ steps.start.outputs.start }} ))
          echo "duration=${ELAPSED}s" >> "$GITHUB_OUTPUT"

      - name: Extract coverage
        id: cov
        run: |
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          print(round(float(root.attrib.get('line-rate','0')) * 100, 1))
          ")
          echo "percent=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Post metrics comment
        uses: actions/github-script@v7
        with:
          script: |
            const duration = '${{ steps.duration.outputs.duration }}';
            const coverage = '${{ steps.cov.outputs.percent }}';
            const sha = context.sha.substring(0, 7);
            const body = `## 📊 PR Quality Gate — \`${sha}\`

            | Metric | Value | Target |
            |--------|-------|--------|
            | ⚡ Pipeline Speed | ${duration} | < 5 min |
            | 🧪 Unit Test Coverage | ${coverage}% | ≥ 70% |
            | 🔒 Security (Bandit) | ✅ Passed | No HIGH/CRITICAL |
            | 🔍 Lint (Ruff) | ✅ Passed | No lint errors |

            > Auto-generated by PR Quality Gate workflow`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('PR Quality Gate'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
