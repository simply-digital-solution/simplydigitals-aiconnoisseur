# ─────────────────────────────────────────────────────────────────────────────
# orchestrator.yml  — Single entry point for all CI/CD
#
# FLOW:
#   1. Detect which sub-projects changed
#   2. Call api-ci.yml  ONLY if API files changed
#   3. Call ui-ci.yml   ONLY if UI files changed
#   4. Post a unified summary comment on PRs
#
# BRANCH STRATEGY:
#   feature/*  → lint + test only (no deploy)
#   develop    → lint + test + build (no deploy)
#   main       → lint + test + build + deploy (staging auto, production gated)
#   release/*  → same as main
# ─────────────────────────────────────────────────────────────────────────────

name: Orchestrator

on:
  push:
    branches: [main, develop, "feature/**", "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Step 1: Detect changes ─────────────────────────────────────────────────
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui:  ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'simplydigitals-aiconnoisseur-api/**'
              - '!simplydigitals-aiconnoisseur-api/**.md'
              - '!simplydigitals-aiconnoisseur-api/docs/**'
            ui:
              - 'simplydigitals-aiconnoisseur-ui/**'
              - '!simplydigitals-aiconnoisseur-ui/**.md'

  # ── Step 2a: Run API pipeline ──────────────────────────────────────────────
  api:
    name: API Pipeline
    needs: detect
    if: needs.detect.outputs.api == 'true'
    uses: ./.github/workflows/api-ci.yml
    with:
      deploy: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
    secrets:
      CODECOV_TOKEN:         ${{ secrets.CODECOV_TOKEN }}
      SONAR_TOKEN:           ${{ secrets.SONAR_TOKEN }}
      SAFETY_API_KEY:        ${{ secrets.SAFETY_API_KEY }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID:        ${{ secrets.AWS_ACCOUNT_ID }}
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}

  # ── Step 2b: Run UI pipeline ───────────────────────────────────────────────
  ui:
    name: UI Pipeline
    needs: detect
    if: needs.detect.outputs.ui == 'true'
    uses: ./.github/workflows/ui-ci.yml
    with:
      deploy: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID:        ${{ secrets.AWS_ACCOUNT_ID }}

  # ── Step 3: Post unified PR summary ───────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [detect, api, ui]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const apiChanged  = '${{ needs.detect.outputs.api }}' === 'true'
            const uiChanged   = '${{ needs.detect.outputs.ui }}'  === 'true'
            const apiResult   = '${{ needs.api.result }}'
            const uiResult    = '${{ needs.ui.result }}'
            const branch      = '${{ github.head_ref }}'
            const sha         = '${{ github.event.pull_request.head.sha }}'.slice(0, 7)
            const runUrl      = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`

            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : r === 'skipped' ? '⏭️' : '⏳'
            const rows = []
            if (apiChanged) rows.push(`| API Pipeline | ${icon(apiResult)} ${apiResult} |`)
            if (uiChanged)  rows.push(`| UI Pipeline  | ${icon(uiResult)}  ${uiResult}  |`)
            if (!apiChanged && !uiChanged) rows.push(`| No source changes detected | ⏭️ All skipped |`)

            const body = [
              `## CI/CD Summary — \`${sha}\` on \`${branch}\``,
              `| Pipeline | Result |`,
              `|----------|--------|`,
              ...rows,
              ``,
              `[View full run](${runUrl})`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c => c.body.includes('CI/CD Summary'))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              })
            }
