<rect x="10" y="400" width="115" height="340" rx="10" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 4" opacity="0.5"/>
<text class="ts" x="67" y="420" text-anchor="middle">CI/CD</text>
