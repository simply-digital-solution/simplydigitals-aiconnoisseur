  <text class="th" x="390" y="337" text-anchor="middle" dominant-baseline="central">MLModelService</text>
</g>

<!-- endpoints → services -->
<line x1="120" y1="262" x2="120" y2="314" class="arr" marker-end="url(#arrow)"/>
<path d="M445 262 L390 314" class="arr" fill="none" marker-end="url(#arrow)"/>
<path d="M290 262 L390 314" class="arr" fill="none" marker-end="url(#arrow)"/>
<path d="M590 262 L390 314" class="arr" fill="none" marker-end="url(#arrow)"/>

<!-- Row 4: ML Pipeline -->
<g class="c-amber">
  <rect x="220" y="415" width="340" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="390" y="437" text-anchor="middle" dominant-baseline="central">ML Pipeline (scikit-learn)</text>
  <text class="ts" x="390" y="457" text-anchor="middle" dominant-baseline="central">Classification · Regression · Clustering · Forecast</text>
</g>
<line x1="390" y1="359" x2="390" y2="414" class="arr" marker-end="url(#arrow)"/>

<!-- Row 5: ORM + Artefact -->
<g class="c-gray">
  <rect x="40" y="535" width="200" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="140" y="555" text-anchor="middle" dominant-baseline="central">SQLAlchemy ORM</text>
