<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 820">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    svg { font-family: system-ui, sans-serif; background: #ffffff; }
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    .ts { font-size: 12px; font-weight: 400; fill: #555550; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    .leader { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }

    /* c-gray */
    .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th { fill: #444441; }
    .c-gray .ts { fill: #5F5E5A; }

    /* c-purple */
    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    /* c-coral */
    .c-coral rect, .c-coral circle, .c-coral ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    /* c-teal */
    .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    /* c-blue */
    .c-blue rect, .c-blue circle, .c-blue ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    /* c-amber */
    .c-amber rect, .c-amber circle, .c-amber ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }
  </style>
</defs>

<!-- Row 0: Client -->
<g class="c-gray">
  <rect x="260" y="20" width="160" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">API client</text>
</g>

<!-- Row 1: API Gateway -->
<g class="c-purple">
  <rect x="160" y="108" width="360" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">FastAPI + OWASP middleware</text>
  <text class="ts" x="340" y="148" text-anchor="middle" dominant-baseline="central">Rate limiting · Security headers · CORS</text>
</g>

<!-- arrow client → gateway -->
<line x1="340" y1="64" x2="340" y2="107" class="arr" marker-end="url(#arrow)"/>

<!-- Row 2: Endpoints -->
<g class="c-coral">
  <rect x="40" y="210" width="160" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="120" y="230" text-anchor="middle" dominant-baseline="central">Auth endpoints</text>
  <text class="ts" x="120" y="250" text-anchor="middle" dominant-baseline="central">Register · Login · Refresh</text>
</g>
<g class="c-teal">
  <rect x="220" y="210" width="140" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="290" y="230" text-anchor="middle" dominant-baseline="central">Datasets API</text>
  <text class="ts" x="290" y="250" text-anchor="middle" dominant-baseline="central">Upload · Profile · Delete</text>
</g>
<g class="c-teal">
  <rect x="380" y="210" width="130" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="445" y="230" text-anchor="middle" dominant-baseline="central">Models API</text>
  <text class="ts" x="445" y="250" text-anchor="middle" dominant-baseline="central">Train · Predict · Delete</text>
</g>
<g class="c-teal">
  <rect x="530" y="210" width="120" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="590" y="230" text-anchor="middle" dominant-baseline="central">Analytics API</text>
  <text class="ts" x="590" y="250" text-anchor="middle" dominant-baseline="central">Describe · Corr · Forecast</text>
</g>

<!-- gateway → endpoints -->
<path d="M220 160 L120 209" class="arr" fill="none" marker-end="url(#arrow)"/>
<path d="M290 160 L290 209" class="arr" fill="none" marker-end="url(#arrow)"/>
<path d="M380 160 L445 209" class="arr" fill="none" marker-end="url(#arrow)"/>
<path d="M430 160 L590 209" class="arr" fill="none" marker-end="url(#arrow)"/>

