version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      SECRET_KEY: local-dev-secret-key-change-in-production!!
      DATABASE_URL: postgresql+asyncpg://mlapi:mlapi@db:5432/mlapi
      DB_ECHO: "false"
      LOG_LEVEL: DEBUG
    volumes:
      - ./app:/app/app:ro        # hot-reload in dev
      - artefacts:/app/artefacts
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlapi
      POSTGRES_PASSWORD: mlapi
      POSTGRES_DB: mlapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["debug"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  artefacts:
