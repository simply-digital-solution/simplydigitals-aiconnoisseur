sonar.projectKey=simplydigitalsolutions_simplydigitals-aiconnoisseur
sonar.organization=simplydigitalsolutions

# Source and tests
sonar.sources=app
sonar.tests=tests
sonar.python.version=3.11

# Coverage
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/htmlcov/**

# Quality gate thresholds tracked:
#   - Coverage             ≥ 80%
#   - Duplicated lines     < 5%
#   - Maintainability rating = A
#   - Reliability rating  = A
#   - Security rating     = A
#   - Code smells         < 10 new
