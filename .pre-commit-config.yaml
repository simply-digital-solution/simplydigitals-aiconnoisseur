repos:
  # ── Gitleaks: secret & token scanning ─────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ── Ruff: Python linter + formatter ───────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^simplydigitals-aiconnoisseur-api/
      - id: ruff-format
        files: ^simplydigitals-aiconnoisseur-api/

  # ── General hygiene ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]

  # ── Local: pytest + coverage (API) and Vitest (UI) ────────────────────────
  - repo: local
    hooks:
      - id: api-pytest-coverage
        name: "API — pytest + coverage (min 70%)"
        entry: bash -c 'cd simplydigitals-aiconnoisseur-api && .venv/bin/python -m pytest'
        language: system
        pass_filenames: false
        files: ^simplydigitals-aiconnoisseur-api/.*\.py$

      - id: ui-vitest
        name: "UI — Vitest unit tests + coverage"
        entry: bash -c 'cd simplydigitals-aiconnoisseur-ui && npx vitest run --coverage'
        language: system
        pass_filenames: false
        files: ^simplydigitals-aiconnoisseur-ui/.*\.(jsx?|tsx?|js|ts)$

      - id: api-bandit
        name: "API — Bandit SAST"
        entry: bash -c 'cd simplydigitals-aiconnoisseur-api && .venv/bin/bandit -r app -ll -q'
        language: system
        pass_filenames: false
        files: ^simplydigitals-aiconnoisseur-api/.*\.py$

      - id: api-pip-audit
        name: "API — pip-audit CVE scan"
        entry: bash -c 'cd simplydigitals-aiconnoisseur-api && .venv/bin/pip freeze --exclude-editable | .venv/bin/pip-audit -r /dev/stdin --desc
          --ignore-vuln CVE-2024-23342
          --ignore-vuln GHSA-rf74-v2fm-23pw
          --ignore-vuln CVE-2026-33230
          --ignore-vuln CVE-2026-33231
          --ignore-vuln CVE-2026-4539'
        language: system
        pass_filenames: false
        files: ^simplydigitals-aiconnoisseur-api/(pyproject\.toml|requirements.*\.txt)$

      - id: ui-npm-audit
        name: "UI — npm audit CVE scan"
        entry: bash -c 'cd simplydigitals-aiconnoisseur-ui && npm audit --audit-level=high'
        language: system
        pass_filenames: false
        files: ^simplydigitals-aiconnoisseur-ui/package(-lock)?\.json$
